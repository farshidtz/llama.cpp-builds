name: Build

on:
  release:
    types: [published]

jobs:
  build:
    permissions:
      contents: write # for uploading release assets
    
    env:
      SOURCE_TAG: ${{ github.event.release.tag_name }}
      ARTIFACT: "llamacpp-${{ matrix.jobs.name }}.tar.gz"

    strategy:
      fail-fast: false
      matrix:
        jobs:
          - name: amd64
            runs-on: ubuntu-24.04

          - name: arm64
            runs-on: ubuntu-24.04-arm

          #
          # Builds with CUDA backend
          #
          - name: amd64+cuda12
            runs-on: ubuntu-24.04
            additional-cmake-flags: "-D GGML_CUDA=ON"
            cuda-toolkit: true

          - name: arm64+cuda12
            runs-on: ubuntu-24.04-arm
            additional-cmake-flags: "-D GGML_CUDA=ON"
            cuda-toolkit: true

    runs-on: ${{ matrix.jobs.runs-on }}
    steps:
      - name: Clone llama.cpp
        uses: actions/checkout@v6
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.SOURCE_TAG }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          # Install CUDA toolkit if required
          if [ "${{ matrix.jobs.cuda-toolkit }}" = "true" ]; then
            case "$(dpkg --print-architecture)" in
              amd64)
                wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
                ;;
              arm64)
                wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
                ;;
              *)
                echo "Unsupported architecture for CUDA Toolkit installation"
                exit 1
              ;;
            esac
          
            sudo dpkg -i cuda-keyring_1.1-1_all.deb
            sudo apt-get -qq update
            sudo apt-get -qq install cuda-toolkit-12-9
          else
            sudo apt-get -qq update
          fi
          
          sudo apt-get -qq install build-essential
          
          # Update to gcc 14 - see https://github.com/ggml-org/llama.cpp/issues/17403#issuecomment-3562034750
          sudo apt-get -qq install gcc-14
          sudo apt-get -qq install g++-14
          sudo snap install cmake --classic

      - name: Build
        run: |
          # Set gcc-14 as the compiler
          export CC=/usr/bin/gcc-14
          export CXX=/usr/bin/g++-14
          
          # Set CUDA compiler for CUDA builds
          export CUDACXX=/usr/local/cuda/bin/nvcc
          
          # Configure and build llama.cpp
          common_flags="-D LLAMA_CURL=OFF -D GGML_NATIVE=OFF -D GGML_BACKEND_DL=ON -D GGML_CPU_ALL_VARIANTS=ON"
          artifacts_flags="-D LLAMA_BUILD_TESTS=OFF -D LLAMA_BUILD_EXAMPLES=OFF -D LLAMA_BUILD_TOOLS=ON -D LLAMA_BUILD_SERVER=ON"
          cmake -B build $common_flags $artifacts_flags ${{ matrix.jobs.additional-cmake-flags }}
          cmake --build build --config Release -j $(nproc)

      - name: Pack artifacts
        run: |
          # Prepare archive directory:
          # - bin for executables
          # - lib for shared libraries
          # - licenses directory
          mkdir -p archive/lib
          mv build/bin/*.so* archive/lib/
          mv build/bin archive/
          cp -r licenses archive/
          cp LICENSE archive/licenses/
          
          # Workaround: llama.cpp expects ggml shared objects in the same directory as executables
          # See issue: https://github.com/ggml-org/llama.cpp/issues/17491
          pushd archive/bin/
          ln -s ../lib/libggml-cpu* ./
          ln -s ../lib/libggml-cuda* ./
          popd
          
          # Copy CUDA runtime libraries if built with CUDA
          if [ "${{ matrix.jobs.cuda-toolkit }}" = "true" ]; then
            copy="cp --no-dereference -v {} archive/lib/ "
            find /usr -name "libcudart.so.*" -exec $copy \;
            find /usr -name "libcublas.so.*" -exec $copy \;
            find /usr -name "libcublasLt.so.*" -exec $copy \;
          fi

          tar -C archive -zcvf $ARTIFACT .

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
